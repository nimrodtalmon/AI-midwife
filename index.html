<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI-Midwife</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Toast -->
  <div id="toast" class="toast toast-out"></div>

  <!-- API Key Modal -->
  <div id="api-key-modal" class="scrim hidden">
    <div class="modal">
      <p class="modal-emoji">🔑</p>
      <h2 class="modal-title">Your API key</h2>
      <p class="modal-sub">Anthropic <span class="mono">sk-ant-…</span> or OpenRouter <span class="mono">sk-or-…</span>. Lives only in your browser.</p>
      <input id="api-key-input" type="password" placeholder="sk-…" class="text-input" autocomplete="off">
      <button id="api-key-submit" class="btn-cta full">Start →</button>
    </div>
  </div>

  <!-- Draft Overlay -->
  <div id="draft-overlay" class="scrim hidden bottom-align">
    <div class="sheet draft-sheet">
      <div class="sheet-top">
        <span class="sheet-title">Draft</span>
        <button id="close-draft" class="icon-btn">✕</button>
      </div>
      <div id="draft-content" class="draft-body prose"></div>
    </div>
  </div>

  <!-- Commitments Sheet -->
  <div id="sheet-scrim" class="scrim hidden" style="background:rgba(0,0,0,0.3)"></div>
  <div id="commitments-sheet" class="sheet bottom-sheet">
    <div class="handle-row"><div class="handle"></div></div>
    <div class="sheet-inner">
      <div class="sheet-top">
        <span class="sheet-title">Your commitments</span>
        <span class="sheet-hint">tap to remove</span>
      </div>
      <div id="commitments-list"></div>
    </div>
  </div>

  <!-- App -->
  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="header-row">
        <span class="logo">midwife ✦</span>
        <div class="header-actions">
          <button id="clear-key-btn" class="ghost">key</button>
          <button id="reset-btn"     class="ghost">new</button>
        </div>
      </div>
      <div class="progress-strip">
        <div class="progress-track">
          <div id="understanding-bar" class="progress-fill blue" style="width:0%"></div>
        </div>
        <div class="progress-track">
          <div id="endorsement-bar" class="progress-fill green" style="width:0%"></div>
        </div>
      </div>
    </header>

    <!-- Question -->
    <main class="main">
      <div class="card">
        <p id="question-stem" class="question"></p>
        <div id="options-container" class="options"></div>

        <div class="row gap-2 mt-3">
          <button id="freetext-btn" class="pill-btn">✏️ Free-text</button>
          <button id="pass-btn"     class="pill-btn">↺ Pass</button>
          <button id="skip-btn"     class="pill-btn">→ Skip</button>
        </div>

        <div id="freetext-area" class="freetext hidden">
          <input id="freetext-input" type="text" placeholder="Type anything…" class="text-input">
          <div class="row gap-2">
            <button id="freetext-submit" class="btn-cta">Send</button>
            <button id="freetext-cancel" class="ghost">Cancel</button>
          </div>
        </div>

        <div id="loading" class="loading hidden">
          <span class="dots"><span></span><span></span><span></span></span>
        </div>

        <div id="error-msg" class="error hidden"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <button id="commitments-btn" class="ideas-btn">
        <span id="commitments-label">0 commitments</span>
        <span class="up-arrow">↑</span>
      </button>
      <button id="show-draft-btn" class="draft-btn">
        Draft
        <span id="draft-dot" class="dot hidden"></span>
      </button>
    </footer>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
