<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI-Midwife</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── Toast ─────────────────────────────────────────────────────────────── -->
  <div id="toast" class="toast toast-hidden"></div>

  <!-- ── API Key Modal ─────────────────────────────────────────────────────── -->
  <div id="api-key-modal" class="modal-scrim hidden">
    <div class="modal-card">
      <div class="modal-glyph">✦</div>
      <h2 class="modal-title">Paste your API key</h2>
      <p class="modal-sub">
        Anthropic <code>sk-ant-…</code> or OpenRouter <code>sk-or-…</code><br>
        Stored in your browser only.
      </p>
      <input id="api-key-input" type="password" placeholder="sk-…"
        autocomplete="off" autocorrect="off" spellcheck="false"
        class="modal-input">
      <button id="api-key-submit" class="btn-primary w-full">Let's go →</button>
    </div>
  </div>

  <!-- ── Draft Overlay ─────────────────────────────────────────────────────── -->
  <div id="draft-overlay" class="modal-scrim hidden items-end">
    <div class="draft-sheet">
      <div class="draft-header">
        <span class="draft-title">Your draft</span>
        <button id="close-draft" class="close-btn">×</button>
      </div>
      <div id="draft-content" class="prose-dark draft-body"></div>
    </div>
  </div>

  <!-- ── Commitments Sheet ──────────────────────────────────────────────────── -->
  <div id="sheet-scrim" class="modal-scrim hidden" style="background:rgba(0,0,0,0.55)"></div>
  <div id="commitments-sheet" class="bottom-sheet">
    <div class="sheet-handle-wrap"><div class="sheet-handle"></div></div>
    <div class="sheet-body">
      <div class="sheet-header">
        <span class="sheet-title">Commitments</span>
        <span class="sheet-hint">tap to retract</span>
      </div>
      <div id="commitments-list" class="flex flex-col gap-2"></div>
    </div>
  </div>

  <!-- ── App Shell ─────────────────────────────────────────────────────────── -->
  <div class="app-shell">

    <!-- HUD Header -->
    <header class="hud-header">
      <div class="hud-top">
        <div class="hud-left">
          <span class="app-logo">✦ Midwife</span>
          <div id="turn-badge" class="turn-badge hidden">Q1</div>
          <div id="phase-badge" class="phase-badge"></div>
        </div>
        <div class="hud-right">
          <button id="clear-key-btn" class="ghost-btn">key</button>
          <button id="reset-btn"     class="ghost-btn danger">new</button>
        </div>
      </div>
      <div class="gauges-row">
        <div class="gauge-wrap">
          <div class="gauge-label">
            <span>Understanding</span>
            <span id="understanding-pct" class="gauge-pct">0%</span>
          </div>
          <div class="gauge-track">
            <div id="understanding-bar" class="gauge-fill blue" style="width:0%"></div>
          </div>
        </div>
        <div class="gauge-wrap">
          <div class="gauge-label">
            <span>Endorsement</span>
            <span id="endorsement-pct" class="gauge-pct">0%</span>
          </div>
          <div class="gauge-track">
            <div id="endorsement-bar" class="gauge-fill emerald" style="width:0%"></div>
          </div>
        </div>
      </div>
    </header>

    <!-- Question Area -->
    <main class="question-area">
      <div class="question-card">
        <p id="question-stem" class="question-stem"></p>
        <div id="options-container" class="options-list"></div>
        <div class="sec-row">
          <button id="freetext-btn" class="sec-btn">Free-text</button>
          <button id="pass-btn"     class="sec-btn">Pass</button>
          <button id="skip-btn"     class="sec-btn">Skip</button>
        </div>

        <!-- Free-text -->
        <div id="freetext-area" class="freetext-area hidden">
          <input id="freetext-input" type="text" placeholder="Say anything…"
            class="freetext-input">
          <div class="freetext-actions">
            <button id="freetext-submit" class="btn-primary flex-1">Send</button>
            <button id="freetext-cancel" class="ghost-btn">Cancel</button>
          </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading-row hidden">
          <div class="spinner"></div>
          <span class="loading-text">Thinking…</span>
        </div>

        <!-- Error -->
        <div id="error-msg" class="error-box hidden"></div>
      </div>
    </main>

    <!-- Bottom Bar -->
    <footer class="bottom-bar">
      <button id="commitments-btn" class="score-btn">
        <span class="score-icon">◆</span>
        <span id="commitments-label" class="score-label">No commitments</span>
        <span class="score-arrow">↑</span>
      </button>
      <button id="show-draft-btn" class="draft-btn">
        Draft
        <span id="draft-dot" class="draft-dot hidden"></span>
      </button>
    </footer>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
